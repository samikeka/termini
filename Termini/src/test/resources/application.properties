spring.main.banner-mode=off
spring.docker.compose.enabled=false

spring.datasource.url=jdbc:h2:mem:terminitest;MODE=MySQL;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

spring.liquibase.enabled=false
termini.demo-data.seed=false

termini.jwt.secret=termini-test-secret-change-me-32chars-minimum!!
termini.jwt.expiration-ms=86400000
termini.frontend-base-url=http://localhost:5173
