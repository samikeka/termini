spring.datasource.url=${TERMINI_DB_URL:jdbc:postgresql://localhost:5432/termini}
spring.datasource.username=${TERMINI_DB_USERNAME:termini_user}
spring.datasource.password=${TERMINI_DB_PASSWORD:termini_pass}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.liquibase.enabled=false
spring.liquibase.change-log=classpath:changelog/changelog-master.yml

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.connection.charSet=utf8
spring.jpa.properties.hibernate.connection.characterEncoding=utf8
spring.jpa.properties.hibernate.connection.useUnicode=true

# JWT (minimum 32 characters)
termini.jwt.secret=${TERMINI_JWT_SECRET:CHANGE_ME_CHANGE_ME_CHANGE_ME_32CHARS!!}
termini.jwt.expiration-ms=86400000
termini.frontend-base-url=http://localhost:5173

# Payments: MOCK (default) or STRIPE_STUB (TASK 12 shell)
termini.payments.checkout-mode=MOCK
termini.payments.platform-fee-percent=0

# Recurring expander interval (ms), default 1h
termini.recurring.poll-ms=3600000

# Demo seed (vet\u00C3\u00ABm p\u00C3\u00ABr dev)
# - termini.demo-data.force=true: mbush mock edhe kur DB s'\u00C3\u00ABsht\u00C3\u00AB bosh
# - termini.demo-data.reset=true: fshin t\u00C3\u00AB dh\u00C3\u00ABnat demo dhe rifillon seed
termini.demo-data.seed=true
# force=true rind\u00C3\u00ABrton t\u00C3\u00AB gjitha fushat n\u00C3\u00AB \u00C3\u00A7do start \u00E2\u0080\u0094 p\u00C3\u00ABrdor vet\u00C3\u00ABm me reset ose DB bosh
termini.demo-data.force=false
termini.demo-data.reset=false
# Shton termine sot/nes\u00C3\u00ABr p\u00C3\u00ABr pronar\u00C3\u00ABt demo (edhe kur fushat ekzistojn\u00C3\u00AB)
termini.demo-data.enrich-owner-panel=true
termini.demo-data.seed-kosovo-outdoor=true