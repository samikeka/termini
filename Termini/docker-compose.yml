services:
  postgres:
    image: postgres:16-alpine
    container_name: termini-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: termini
      POSTGRES_USER: termini_user
      POSTGRES_PASSWORD: termini_pass
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U termini_user -d termini" ]
      interval: 5s
      timeout: 5s
      retries: 12

volumes:
  pg_data:
